
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream cat_content    { server 127.0.0.1:<CONTENT_PORT>; keepalive 32; }
upstream cat_explore    { server 127.0.0.1:<EXPLORE_PORT>; keepalive 32; }
upstream cat_create     { server 127.0.0.1:<CREATE_PORT>; keepalive 32; }
upstream cat_social     { server 127.0.0.1:<SOCIAL_PORT>; keepalive 32; }
upstream cat_data       { server 127.0.0.1:<DATA_PORT>; keepalive 32; }
upstream cat_abcdn      { server 127.0.0.1:<ABCDN_PORT>; keepalive 32; }
upstream cat_social_rpc { server 127.0.0.1:<SOCIAL_RPC_PORT>; keepalive 32; }

server {
    server_name realm.example.com;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;


    client_max_body_size 1m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /         { proxy_pass http://cat_content; }
    location /about     { proxy_pass http://cat_content; }
    location /content/  { proxy_pass http://cat_content; }
    location /lambdas/  { proxy_pass http://cat_content; }
    location /entities/ { proxy_pass http://cat_content; }

    location = /content/entities {
        limit_req zone=catdeploy burst=4 nodelay;
        limit_req_status 429;
        client_max_body_size 200m;
        client_body_timeout 300s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_pass http://cat_content;
    }

    location /api/places       { proxy_pass http://cat_explore; }
    location /api/destinations { proxy_pass http://cat_explore; }
    location /api/map          { proxy_pass http://cat_explore; }
    location /api/report       { proxy_pass http://cat_explore; }
    location /places           { proxy_pass http://cat_explore; }
    location /world_names      { proxy_pass http://cat_explore; }
    location /worlds           { proxy_pass http://cat_explore; }
    location /categories       { proxy_pass http://cat_explore; }

    location /pois             { proxy_pass http://cat_explore; }

    location /api/events       { proxy_pass http://cat_explore; }
    location /api/schedules    { proxy_pass http://cat_explore; }
    location /api/poster       { proxy_pass http://cat_explore; }
    location /api/poster-vertical { proxy_pass http://cat_explore; }
    location /api/profiles/settings      { proxy_pass http://cat_explore; }
    location /events/          { proxy_pass http://cat_explore; }

    location /v1/map.png       { proxy_pass http://cat_explore; }
    location /v1/minimap.png   { proxy_pass http://cat_explore; }
    location /v1/estatemap.png { proxy_pass http://cat_explore; }
    location /v1/tiles         { proxy_pass http://cat_explore; }
    location /v2/              { proxy_pass http://cat_explore; }

    location /comms/peers      { proxy_pass http://cat_explore; }
    location /hot-scenes       { proxy_pass http://cat_explore; }
    location /core-status      { proxy_pass http://cat_explore; }
    location /stats/health     { proxy_pass http://cat_explore; }
    location /heartbeat        { proxy_pass http://cat_explore; }
    location /auth/challenge       { proxy_pass http://cat_explore; }
    location /auth/livekit-token   { proxy_pass http://cat_explore; }
    location = /ws {
        limit_conn catws 8;
        limit_conn_status 429;
        proxy_pass http://cat_explore;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location /world/           { proxy_pass http://cat_explore; }
    location /wallet/          { proxy_pass http://cat_explore; }

    location /v1/newsletter    { proxy_pass http://cat_create; }
    location /v1/collections/  { proxy_pass http://cat_create; }
    location /v1/storage/      { proxy_pass http://cat_create; }

    location /images           { proxy_pass http://cat_create; }
    location /users            { proxy_pass http://cat_create; }
    location ~ ^/places/[^/]+/images { proxy_pass http://cat_create; }

    location /profiles         { proxy_pass http://cat_create; }
    location /registry         { proxy_pass http://cat_create; }
    location /denylist         { proxy_pass http://cat_create; }
    location /queues/          { proxy_pass http://cat_create; }
    location /flush-cache      { proxy_pass http://cat_create; }

    location /v1/communities   { proxy_pass http://cat_social; }
    location /v1/members       { proxy_pass http://cat_social; }
    location /v1/community-voice-chats { proxy_pass http://cat_social; }
    location /v1/moderation/   { proxy_pass http://cat_social; }
    location /federation/communities { proxy_pass http://cat_social; }
    location /social/communities { proxy_pass http://cat_social; }

    location /get-scene-adapter        { proxy_pass http://cat_social; }
    location /get-server-scene-adapter { proxy_pass http://cat_social; }
    location /scene-participants        { proxy_pass http://cat_social; }
    location /scene-bans/               { proxy_pass http://cat_social; }
    location /private-messages/token    { proxy_pass http://cat_social; }
    location /community-voice-chat       { proxy_pass http://cat_social; }
    location /cast/                      { proxy_pass http://cat_social; }
    location = /bans                     { proxy_pass http://cat_social; }
    location = /livekit-webhook          { proxy_pass http://cat_social; }

    location /notifications    { proxy_pass http://cat_social; }
    location /subscription     { proxy_pass http://cat_social; }
    location /set-email        { proxy_pass http://cat_social; }
    location /confirm-email    { proxy_pass http://cat_social; }

    location /badges/          { proxy_pass http://cat_social; }

    location /translate        { proxy_pass http://cat_social; }

    location /v1/catalog    { proxy_pass http://cat_data; }
    location /v2/catalog    { proxy_pass http://cat_data; }
    location /v1/items      { proxy_pass http://cat_data; }
    location /v1/nfts       { proxy_pass http://cat_data; }
    location /v1/orders     { proxy_pass http://cat_data; }
    location /v1/bids       { proxy_pass http://cat_data; }
    location /v1/sales      { proxy_pass http://cat_data; }
    location /v1/trades     { proxy_pass http://cat_data; }
    location /v1/accounts   { proxy_pass http://cat_data; }
    location /v1/activity   { proxy_pass http://cat_data; }
    location /v1/contracts  { proxy_pass http://cat_data; }
    location /v1/owners     { proxy_pass http://cat_data; }
    location /v1/prices     { proxy_pass http://cat_data; }
    location /v1/trendings  { proxy_pass http://cat_data; }
    location /v1/volume     { proxy_pass http://cat_data; }
    location /v1/catalog/   { proxy_pass http://cat_data; }

    location /v1/transactions { proxy_pass http://cat_data; }

    location /users/          { proxy_pass http://cat_data; }  # /users/{wallet}/progress
    location /seasons         { proxy_pass http://cat_data; }
    location = /captcha       { proxy_pass http://cat_data; }

    location /api/v3/simple/price { proxy_pass http://cat_data; }

    location ~ ^/(mainnet|sepolia|polygon|amoy|ethereum)$ { proxy_pass http://cat_data; }

    location /LOD/        { proxy_pass http://cat_abcdn; }
    location /manifest/   { proxy_pass http://cat_abcdn; }
    location ~ ^/v[0-9]+/ { proxy_pass http://cat_abcdn; }  # versioned AB binaries

    location /social-rpc {
        limit_conn catws 8;
        limit_conn_status 429;
        rewrite ^/social-rpc/?(.*)$ /$1 break;
        proxy_pass http://cat_social_rpc;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location = /metrics { return 404; }
    location /admin     { return 404; }   # SSR ops console (incl. /admin/{service}) — loopback/private network only
    location = /debug   { return 404; }

    location / { return 404; }
}
