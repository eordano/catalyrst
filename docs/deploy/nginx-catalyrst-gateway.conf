# catalyrst gateway edge: speak the Decentraland *gateway* path-routing contract.
#
# This makes catalyrst answer the SAME shape the stock unity-explorer emits when
# its `USE_GATEWAY` path is on (`GatewayUrlsSource`): every supported service URL
#
#     https://{subdomain}.decentraland.{env}/{path}
#
# is rewritten by the client to
#
#     https://{gateway-host}/{subdomain}/{path}
#
# e.g. ab-cdn.decentraland.org/v44/<e>/<h>  ->  {gateway-host}/ab-cdn/v44/<e>/<h>
#      places.decentraland.org/api/places   ->  {gateway-host}/places/api/places
#      asset-bundle-registry.decentraland.org/profiles -> {gateway-host}/asset-bundle-registry/profiles
#
# So the gateway's only job is: take the first path segment (the original service
# subdomain), pick the bundle that owns it, strip that one segment, and forward
# the remaining path VERBATIM. The catalyrst member crates are 1:1 ports that
# serve the real upstream paths at the bundle root, so the un-prefixed remainder
# hits the right handler unchanged. See docs/deploy/gateway.md for the contract.
#
# This is a SEPARATE server block from nginx-catalyrst-bundles.conf (the native
# host-collapse edge) on purpose: the two addressing schemes collide — e.g. the
# bare `/places/{id}` place-detail route vs. the `places` subdomain prefix. Pick
# one model per host.
#
# Pointing the stock explorer here (no explorer code change):
#   * pin DNS / /etc/hosts so `gateway.decentraland.org` (and `.zone`) resolve to
#     this host, and set `server_name` below to match; or
#   * set `server_name` to your own host and feed it via the explorer's gateway
#     host override.
#
# Port map (all loopback; substitute the ports your deployment allocates):
#   <CONTENT_PORT>       content / catalyrst-live   (realm: content, lambdas, about)
#   <EXPLORE_PORT>       catalyrst-explore          (places, map-api, archipelago, worlds)
#   <CREATE_PORT>        catalyrst-create           (asset-bundle-registry, camera-reel)
#   <SOCIAL_PORT>        catalyrst-social           (social-api, comms-gatekeeper, notifications, badges, media, assets-cdn)
#   <DATA_PORT>          catalyrst-data             (credits)
#   <ABCDN_PORT>         catalyrst-ab-cdn           (ab-cdn)
#   <EXPLORER_API_PORT>  catalyrst-explorer-api     (realm-provider, auth-api)
#   <PROFILE_IMAGES_PORT> catalyrst-profile-images  (profile-images)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream cat_content        { server 127.0.0.1:<CONTENT_PORT>; keepalive 32; }
upstream cat_explore        { server 127.0.0.1:<EXPLORE_PORT>; keepalive 32; }
upstream cat_create         { server 127.0.0.1:<CREATE_PORT>; keepalive 32; }
upstream cat_social         { server 127.0.0.1:<SOCIAL_PORT>; keepalive 32; }
upstream cat_data           { server 127.0.0.1:<DATA_PORT>; keepalive 32; }
upstream cat_abcdn          { server 127.0.0.1:<ABCDN_PORT>; keepalive 32; }
upstream cat_explorer_api   { server 127.0.0.1:<EXPLORER_API_PORT>; keepalive 32; }
upstream cat_profile_images { server 127.0.0.1:<PROFILE_IMAGES_PORT>; keepalive 32; }

server {
    # Match whichever host the explorer routes its gateway traffic to.
    server_name gateway.decentraland.org gateway.decentraland.zone;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # TLS, real-IP, security headers and rate-limit zones live in a companion edge
    # config (ssl_certificate / ssl_certificate_key are provisioned by your ACME
    # client). If a CDN/proxy fronts this, restore the real client IP here.

    client_max_body_size 1m;

    # ---- shared proxy headers ----
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # ============================================================
    # Realm natives (this host is also the realm the client discovers via /about).
    # Not gateway-prefixed: the client reads content.publicUrl / lambdas.publicUrl
    # from /about and talks to them directly. Drop this section if you run a pure
    # gateway host with the realm served elsewhere.
    # ============================================================
    location = /         { proxy_pass http://cat_content; }
    location /about      { proxy_pass http://cat_content; }
    location /content/   { proxy_pass http://cat_content; }
    location /lambdas/   { proxy_pass http://cat_content; }
    location /entities/  { proxy_pass http://cat_content; }

    # authoritative deploy (rate-limited, large body, streamed)
    location = /content/entities {
        limit_req zone=catdeploy burst=4 nodelay;
        limit_req_status 429;
        client_max_body_size 200m;
        client_body_timeout 300s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_pass http://cat_content;
    }

    # realm comms websocket (the /about fixedAdapter target)
    location = /ws {
        limit_conn catws 8;
        limit_conn_status 429;
        proxy_pass http://cat_explore;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # ============================================================
    # Gateway prefixes — strip the {subdomain} segment, forward the rest verbatim.
    # The `rewrite ^/<sub>/?(.*)$ /$1 break` form keeps the query string and
    # handles both the bare prefix and any sub-path.
    # ============================================================

    # --- explore bundle: places, map-api, archipelago, worlds ---
    location /places                { rewrite ^/places/?(.*)$                /$1 break; proxy_pass http://cat_explore; }
    location /api                   { rewrite ^/api/?(.*)$                   /$1 break; proxy_pass http://cat_explore; }   # api.* map chunks (/v1/map.png, /v2/*)
    location /archipelago-ea-stats  { rewrite ^/archipelago-ea-stats/?(.*)$ /$1 break; proxy_pass http://cat_explore; }
    location /worlds-content-server { rewrite ^/worlds-content-server/?(.*)$ /$1 break; proxy_pass http://cat_explore; }

    # --- explorer-api bundle: realm-provider, auth-api ---
    location /realm-provider-ea     { rewrite ^/realm-provider-ea/?(.*)$     /$1 break; proxy_pass http://cat_explorer_api; }
    location /auth-api              { rewrite ^/auth-api/?(.*)$              /$1 break; proxy_pass http://cat_explorer_api; }

    # --- create bundle: asset-bundle-registry (incl. /profiles, /entities/active), camera-reel ---
    location /asset-bundle-registry { rewrite ^/asset-bundle-registry/?(.*)$ /$1 break; proxy_pass http://cat_create; }
    location /camera-reel-service   { rewrite ^/camera-reel-service/?(.*)$   /$1 break; proxy_pass http://cat_create; }

    # --- social bundle: communities, comms-gatekeeper, notifications, badges, media, thumbnails ---
    location /social-api            { rewrite ^/social-api/?(.*)$            /$1 break; proxy_pass http://cat_social; }
    location /comms-gatekeeper      { rewrite ^/comms-gatekeeper/?(.*)$      /$1 break; proxy_pass http://cat_social; }
    location /notifications         { rewrite ^/notifications/?(.*)$         /$1 break; proxy_pass http://cat_social; }
    location /badges                { rewrite ^/badges/?(.*)$                /$1 break; proxy_pass http://cat_social; }
    location /metamorph-api         { rewrite ^/metamorph-api/?(.*)$         /$1 break; proxy_pass http://cat_social; }   # MediaConverter /convert
    location /assets-cdn            { rewrite ^/assets-cdn/?(.*)$            /$1 break; proxy_pass http://cat_social; }   # community raw-thumbnails

    # --- data bundle: credits ---
    location /credits               { rewrite ^/credits/?(.*)$               /$1 break; proxy_pass http://cat_data; }

    # --- ab-cdn bundle: asset-bundle binaries / LOD / manifest ---
    location /ab-cdn                { rewrite ^/ab-cdn/?(.*)$                /$1 break; proxy_pass http://cat_abcdn; }

    # --- profile-images bundle: avatar thumbnails (non-client-origin host) ---
    location /profile-images        { rewrite ^/profile-images/?(.*)$       /$1 break; proxy_pass http://cat_profile_images; }

    # ---- defense in depth ----
    location = /metrics { return 404; }
    location /admin     { return 404; }   # SSR ops console — loopback/private network only
    location = /debug   { return 404; }

    # ---- catch-all: nothing else is exposed ----
    location / { return 404; }
}
