
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream cat_content        { server 127.0.0.1:<CONTENT_PORT>; keepalive 32; }
upstream cat_explore        { server 127.0.0.1:<EXPLORE_PORT>; keepalive 32; }
upstream cat_create         { server 127.0.0.1:<CREATE_PORT>; keepalive 32; }
upstream cat_social         { server 127.0.0.1:<SOCIAL_PORT>; keepalive 32; }
upstream cat_data           { server 127.0.0.1:<DATA_PORT>; keepalive 32; }
upstream cat_abcdn          { server 127.0.0.1:<ABCDN_PORT>; keepalive 32; }
upstream cat_explorer_api   { server 127.0.0.1:<EXPLORER_API_PORT>; keepalive 32; }
upstream cat_profile_images { server 127.0.0.1:<PROFILE_IMAGES_PORT>; keepalive 32; }

server {
    server_name gateway.decentraland.org gateway.decentraland.zone;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;


    client_max_body_size 1m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    location = /         { proxy_pass http://cat_content; }
    location /about      { proxy_pass http://cat_content; }
    location /content/   { proxy_pass http://cat_content; }
    location /lambdas/   { proxy_pass http://cat_content; }
    location /entities/  { proxy_pass http://cat_content; }

    location = /content/entities {
        limit_req zone=catdeploy burst=4 nodelay;
        limit_req_status 429;
        client_max_body_size 200m;
        client_body_timeout 300s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_pass http://cat_content;
    }

    location = /ws {
        limit_conn catws 8;
        limit_conn_status 429;
        proxy_pass http://cat_explore;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }


    location /places                { rewrite ^/places/?(.*)$                /$1 break; proxy_pass http://cat_explore; }
    location /api                   { rewrite ^/api/?(.*)$                   /$1 break; proxy_pass http://cat_explore; }   # api.* map chunks (/v1/map.png, /v2/*)
    location /archipelago-ea-stats  { rewrite ^/archipelago-ea-stats/?(.*)$ /$1 break; proxy_pass http://cat_explore; }
    location /worlds-content-server { rewrite ^/worlds-content-server/?(.*)$ /$1 break; proxy_pass http://cat_explore; }

    location /realm-provider-ea     { rewrite ^/realm-provider-ea/?(.*)$     /$1 break; proxy_pass http://cat_explorer_api; }
    location /auth-api              { rewrite ^/auth-api/?(.*)$              /$1 break; proxy_pass http://cat_explorer_api; }

    location /asset-bundle-registry { rewrite ^/asset-bundle-registry/?(.*)$ /$1 break; proxy_pass http://cat_create; }
    location /camera-reel-service   { rewrite ^/camera-reel-service/?(.*)$   /$1 break; proxy_pass http://cat_create; }

    location /social-api            { rewrite ^/social-api/?(.*)$            /$1 break; proxy_pass http://cat_social; }
    location /comms-gatekeeper      { rewrite ^/comms-gatekeeper/?(.*)$      /$1 break; proxy_pass http://cat_social; }
    location /notifications         { rewrite ^/notifications/?(.*)$         /$1 break; proxy_pass http://cat_social; }
    location /badges                { rewrite ^/badges/?(.*)$                /$1 break; proxy_pass http://cat_social; }
    location /metamorph-api         { rewrite ^/metamorph-api/?(.*)$         /$1 break; proxy_pass http://cat_social; }   # MediaConverter /convert
    location /assets-cdn            { rewrite ^/assets-cdn/?(.*)$            /$1 break; proxy_pass http://cat_social; }   # community raw-thumbnails

    location /credits               { rewrite ^/credits/?(.*)$               /$1 break; proxy_pass http://cat_data; }

    location /ab-cdn                { rewrite ^/ab-cdn/?(.*)$                /$1 break; proxy_pass http://cat_abcdn; }

    location /profile-images        { rewrite ^/profile-images/?(.*)$       /$1 break; proxy_pass http://cat_profile_images; }

    location = /metrics { return 404; }
    location /admin     { return 404; }   # SSR ops console — loopback/private network only
    location = /debug   { return 404; }

    location / { return 404; }
}
