[package]
name = "catalyrst-signatures"
version = "0.10.0"
edition = "2021"
description = "Rust port of decentraland/signatures-server (signatures-api.decentraland.org), the LAND/Estate rental-listing signature store over a dedicated postgres DB"

[[bin]]
name = "catalyrst-signatures"
path = "src/main.rs"

[dependencies]
catalyrst-crypto = { workspace = true }
catalyrst-types = { workspace = true }
catalyrst-envcfg = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
sqlx = { workspace = true, features = ["uuid", "migrate", "chrono", "json"] }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
uuid = { workspace = true }
url = { workspace = true }
ethers-core = { workspace = true }
hex = "0.4"
