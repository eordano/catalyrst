[package]
name = "catalyrst-market"
version = "0.1.0"
edition = "2021"
description = "Rust port of decentraland/marketplace-server REST API — reads from squid_marketplace schema"

[[bin]]
name = "catalyrst-market"
path = "src/main.rs"

[dependencies]
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sqlx = { workspace = true, features = ["uuid"] }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
chrono = { workspace = true }
url = { workspace = true }
catalyrst-server = { path = "../catalyrst-server" }
catalyrst-db = { workspace = true }
catalyrst-types = { workspace = true }
catalyrst-crypto = { workspace = true }
catalyrst-fed = { workspace = true }
sha2 = { workspace = true }
hex = "0.4"
parking_lot = { workspace = true }
uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
ethers-signers = { workspace = true }
ethers-core = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
rand = "0.10"
reqwest = { workspace = true }

[[example]]
name = "smoke_bid"
path = "examples/smoke_bid.rs"
