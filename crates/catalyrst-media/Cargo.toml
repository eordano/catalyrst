[package]
name = "catalyrst-media"
version = "0.12.0"
edition = "2021"
description = "Rust port of decentraland/autotranslate-server (autotranslate-server.decentraland.org): LibreTranslate-compatible POST /translate (single + batch), postgres TTL cache."

[[bin]]
name = "catalyrst-media"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
reqwest = { workspace = true }
sqlx = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
catalyrst-envcfg = { workspace = true }
async-trait = { workspace = true }
sha2 = { workspace = true }
