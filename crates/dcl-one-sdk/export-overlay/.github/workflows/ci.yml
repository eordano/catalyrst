name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable @ 2026-07-08
        with:
          toolchain: "1.97.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  check:
    name: clippy + test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable @ 2026-07-08
        with:
          toolchain: "1.97.0"
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
      # --locked everywhere: a stale Cargo.lock must fail CI, not the release
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  windows-cross:
    # compile-check only: proves the x86_64-pc-windows-gnu release target
    # still builds and links; the binary is exercised on real hardware per release
    name: windows-gnu cross compile
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable @ 2026-07-08
        with:
          toolchain: "1.97.0"
          targets: x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: install protoc + mingw cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler g++-mingw-w64-x86-64-posix cmake
          cat > /tmp/mingw-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Windows)
          set(CMAKE_SYSTEM_PROCESSOR x86_64)
          set(CMAKE_C_COMPILER x86_64-w64-mingw32-gcc-posix)
          set(CMAKE_CXX_COMPILER x86_64-w64-mingw32-g++-posix)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          EOF
          {
            echo "CMAKE_TOOLCHAIN_FILE=/tmp/mingw-toolchain.cmake"
            echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc-posix"
            echo "CC_x86_64_pc_windows_gnu=x86_64-w64-mingw32-gcc-posix"
            echo "CXX_x86_64_pc_windows_gnu=x86_64-w64-mingw32-g++-posix"
            echo "AR_x86_64_pc_windows_gnu=x86_64-w64-mingw32-ar"
          } >> "$GITHUB_ENV"
      - run: cargo build --locked --target x86_64-pc-windows-gnu -p dcl-one-sdk

  nix:
    name: nix build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            max-jobs = auto
            cores = 0
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - run: nix build --print-build-logs
      - run: ./result/bin/dcl-one-sdk --help
