[workspace]
resolver = "2"
members = [
    "crates/catalyrst-envcfg",
    "crates/catalyrst-types",
    "crates/catalyrst-hashing",
    "crates/catalyrst-crypto",
    "crates/catalyrst-preview-tunnel",
    "crates/dcl-one-sdk",
]

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["multipart"] }
tower-http = { version = "0.7", features = ["cors", "trace", "timeout"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "stream", "rustls", "http2", "charset", "query", "multipart", "form"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["float_roundtrip"] }
sha2 = "0.11"
base64 = "0.22"
bs58 = "0.5"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow = "1"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
url = { version = "2", features = ["serde"] }
futures = "0.3"
async-trait = "0.1"
parking_lot = "0.12"
tokio-tungstenite = "=0.29.0"
# sqlx is an OPTIONAL dep of catalyrst-types (DB-facing types); the SDK does not
# use them, so catalyrst-types is pulled with default-features off — sqlx is
# defined here only so the crate's `sqlx = { workspace = true, optional = true }`
# inheritance resolves, and is never actually compiled.
sqlx = { version = "0.9", features = ["runtime-tokio", "postgres", "json", "chrono"] }
catalyrst-envcfg = { path = "crates/catalyrst-envcfg" }
catalyrst-types = { path = "crates/catalyrst-types", default-features = false }
catalyrst-hashing = { path = "crates/catalyrst-hashing" }
catalyrst-crypto = { path = "crates/catalyrst-crypto" }
catalyrst-preview-tunnel = { path = "crates/catalyrst-preview-tunnel" }
