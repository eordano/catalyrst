[package]
name = "catalyrst-quests"
version = "0.9.10"
edition = "2021"
description = "Port of decentraland/quests — quests/achievements backend. REST surface carries the protobuf-defined message shapes (decentraland.quests definitions.proto via prost). The dcl-rpc QuestsService (StartQuest/Abort/SendEvent/Subscribe/GetAllQuests/GetQuestDefinition) is served over a signed-auth-chain WebSocket transport."

[lib]
path = "src/lib.rs"

[[bin]]
name = "catalyrst-quests"
path = "src/main.rs"

[dependencies]
catalyrst-types = { workspace = true }
catalyrst-crypto = { workspace = true }
catalyrst-fed = { workspace = true }

dcl-rpc = "2.3.6"
prost = "0.11"
prost-types = "0.11"

tokio = { workspace = true }
axum = { workspace = true, features = ["ws"] }
tower = { workspace = true }
tower-http = { workspace = true }
reqwest = { workspace = true }
sqlx = { workspace = true, features = ["uuid"] }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
dashmap = { workspace = true }

[dev-dependencies]
ethers-signers = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[build-dependencies]
dcl-rpc = { version = "2.3.6", features = ["codegen"] }
prost-build = "0.11"
