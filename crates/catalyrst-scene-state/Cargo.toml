[package]
name = "catalyrst-scene-state"
version = "0.1.0"
edition = "2021"
description = "Rust port of decentraland/scene-state-server — authoritative server-side scene state for SDK7 multiplayer scenes (HTTP + WebSocket, CRDT relay). Port 5153."

[[bin]]
name = "catalyrst-scene-state"
path = "src/main.rs"

[dependencies]
catalyrst-types = { workspace = true }
catalyrst-crypto = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true, features = ["ws"] }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
# V8 JavaScript engine (rusty_v8). Pinned exactly so the offline Nix build can
# match a single prebuilt librusty_v8 archive via RUSTY_V8_ARCHIVE — see the
# crate README "V8 under Nix". 149.3.0 is the version deno_core 0.403 tracks and
# has a published librusty_v8_release_<target>.a.gz on the rusty_v8 v149.3.0
# release (the same archive the v8 crate's build.rs would otherwise download).
v8 = "=149.3.0"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
