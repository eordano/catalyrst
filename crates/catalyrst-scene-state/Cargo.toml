[package]
name = "catalyrst-scene-state"
version = "0.12.0"
edition = "2021"
description = "Rust port of decentraland/scene-state-server — authoritative server-side scene state for SDK7 multiplayer scenes (HTTP + WebSocket, CRDT relay). Port 5209."

[[bin]]
name = "catalyrst-scene-state"
path = "src/main.rs"

[dependencies]
catalyrst-types = { workspace = true }
catalyrst-crypto = { workspace = true }
catalyrst-envcfg = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true, features = ["ws"] }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
parking_lot = { workspace = true }
dashmap = { workspace = true }
futures = { workspace = true }
v8 = "=149.4.0"

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
catalyrst-world-storage = { path = "../catalyrst-world-storage" }
