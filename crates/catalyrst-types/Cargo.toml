[package]
name = "catalyrst-types"
version = "0.12.0"
edition = "2021"
description = "Rust port of the Decentraland catalyst content server type definitions"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
axum = { workspace = true }
sqlx = { workspace = true, optional = true }
tracing = { workspace = true }
flate2 = "1"

[features]
default = ["sqlx"]
sqlx = ["dep:sqlx"]
