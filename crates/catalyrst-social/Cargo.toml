[package]
name = "catalyrst-social"
version = "0.9.10"
edition = "2021"
description = "Social bundle: composes the catalyrst-communities, -comms, -notifications, -badges and -media API routers onto a single axum port (5145). Each member crate stays a standalone binary; this binary serves all of them at once."

[[bin]]
name = "catalyrst-social"
path = "src/main.rs"

[dependencies]
catalyrst-communities = { path = "../catalyrst-communities" }
catalyrst-comms = { path = "../catalyrst-comms" }
catalyrst-notifications = { path = "../catalyrst-notifications" }
catalyrst-badges = { path = "../catalyrst-badges" }
catalyrst-media = { path = "../catalyrst-media" }
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
