[package]
name = "catalyrst-map"
version = "0.12.0"
edition = "2021"
description = "Rust port of decentraland/atlas-server (api.decentraland.org map tiles + map.png renderer), sourced from the shared marketplace_squid DB"

[[bin]]
name = "catalyrst-map"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
sqlx = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
catalyrst-envcfg = { workspace = true }
parking_lot = { workspace = true }
reqwest = { workspace = true }
tiny-skia = "0.12"
lru = "0.18"
