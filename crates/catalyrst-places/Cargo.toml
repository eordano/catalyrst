[package]
name = "catalyrst-places"
version = "0.1.0"
edition = "2021"
description = "Rust port of decentraland/places (REST API for places.decentraland.org), federation-aware via catalyrst-fed"

[[bin]]
name = "catalyrst-places"
path = "src/main.rs"

[features]
default = []
# Enable live NATS JetStream federation gossip (publish + consumer apply-loop).
# Off by default: a no-peer deploy applies locally and reconciles via snapshot
# pull. Build with `--features nats` to wire the real broker (FED_GOSSIP=nats).
nats = ["catalyrst-fed/nats"]

[dependencies]
catalyrst-fed = { workspace = true }
catalyrst-crypto = { workspace = true }
catalyrst-types = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
sqlx = { workspace = true }
reqwest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
sha1 = "0.11"
hmac = { workspace = true }
base64 = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
