[package]
name = "abgen-gpu-kernel-ptx"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-or-later"
description = "rustc-native nvptx64 PTX kernels for abgen-gpu-core (nightly + -Z build-std=core; artifact consumed by host via ABGEN_GPU_PTX)"

[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
libm = "0.2.11"

[profile.release]
panic = "abort"
opt-level = 3
codegen-units = 1
