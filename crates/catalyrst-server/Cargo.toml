[package]
name = "catalyrst-server"
version = "0.1.0"
edition = "2021"
description = "Rust port of the Decentraland catalyst content server HTTP layer"

[[bin]]
name = "catalyrst-server"
path = "src/main.rs"

[[bin]]
name = "catalyrst-live"
path = "src/bin/live.rs"

[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = "0.7"

[dependencies]
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
feruca = { workspace = true }
chrono = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["normalize-path"] }
bytes = { workspace = true }
async-trait = { workspace = true }
sqlx = { workspace = true }
catalyrst-db = { workspace = true }
catalyrst-storage = { workspace = true }
uuid = { workspace = true }
tokio-util = { workspace = true }
dashmap = { workspace = true }
catalyrst-sync = { workspace = true }
catalyrst-validator = { workspace = true }
catalyrst-crypto = { workspace = true }
catalyrst-hashing = { workspace = true }
reqwest = { workspace = true }
parking_lot = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
regex = "1"
urlencoding = "2"
futures = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
